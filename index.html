<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Book Finder</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- HEADER -->
  <header>
    <h1>📚 Book Finder</h1>
    <p>Search for books and build your personal reading list</p>
  </header>

  <!-- SEARCH BAR -->
  <section class="search-section">
    <input type="text" id="searchInput" placeholder="Search books (e.g., Harry Potter)" />
    <button onclick="searchBooks()">Search</button>
  </section>

  <!-- STATUS MESSAGES -->
  <section class="status">
    <p id="loading" class="hidden">Loading books...</p>
    <p id="error" class="hidden">⚠️ Something went wrong. Try again.</p>
    <p id="noResults" class="hidden">No results found.</p>
  </section>

  <!-- SEARCH RESULTS -->
  <section>
    <h2>🔍 Results</h2>
    <div id="books" class="grid"></div>
  </section>

  <!-- FAVORITES -->
  <section>
    <h2>⭐ Favorites</h2>
    <div id="favorites" class="grid"></div>
  </section>

  <!-- PERSONAL BOOK LIST -->
  <section>
    <h2>📖 Books I've Read</h2>
    <div id="myBooks" class="grid"></div>
  </section>

  <footer>
    <p>Built using Open Library API</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
